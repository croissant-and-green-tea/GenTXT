name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:

  # === Lint =================================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/

  # === Tests ================================================================
  test:
    name: Tests + couverture
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libxkbcommon-x11-0 libdbus-1-3 \
            libegl1 libopengl0
            
      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v --tb=short --cov=src/gentxt --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # === Build Linux ==========================================================
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libdbus-1-3

      - name: Install Python deps
        run: pip install -r requirements-build.txt

      - name: Build
        env:
          QT_QPA_PLATFORM: offscreen
        run: pyinstaller GenTxt.spec

      - name: Verify
        run: test -f dist/GenTXT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenTXT-linux
          path: dist/GenTXT
          retention-days: 14

  # === Build Windows ========================================================
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements-build.txt

      - name: Build
        run: pyinstaller GenTxt.spec

      - name: Verify
        shell: pwsh
        run: Test-Path dist/GenTXT.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenTXT-windows
          path: dist/GenTXT.exe
          retention-days: 14

  # === Documentation ========================================================
  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs deps
        run: pip install -r requirements-docs.txt

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy
        run: mkdocs gh-deploy --force